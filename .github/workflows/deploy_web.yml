name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy_web.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Build
        run: |
          cd web
          npm run build

      - name: Inject GitHub Token into dispatch.php
        run: |
          sed -i 's/TU_TOKEN_DE_GITHUB_AQUI/${{ secrets.GH_DISPATCH_TOKEN }}/g' web/dist/api/dispatch.php

      - name: Upload to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: ./web/dist/*
          remote_path: ./
          sftp_only: true
